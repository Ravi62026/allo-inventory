version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: allo_postgres
    environment:
      POSTGRES_USER: allo
      POSTGRES_PASSWORD: allo_dev_password
      POSTGRES_DB: allo_inventory
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U allo"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allo_network

  redis:
    image: redis:7-alpine
    container_name: allo_redis
    command: redis-server --appendonly yes --appendfilename "allo.aof"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - allo_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: allo_app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Database
      DATABASE_URL: "postgresql://allo:allo_dev_password@postgres:5432/allo_inventory"
      DIRECT_URL: "postgresql://allo:allo_dev_password@postgres:5432/allo_inventory"
      # Redis (via localhost inside container)
      UPSTASH_REDIS_REST_URL: "http://redis:6379"
      UPSTASH_REDIS_REST_TOKEN: "local_dev_token"
      # Security
      CRON_SECRET: "dev_cron_secret_minimum_32_characters_long!!"
      # Node environment
      NODE_ENV: "production"
    ports:
      - "3000:3000"
    networks:
      - allo_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  allo_network:
    driver: bridge
